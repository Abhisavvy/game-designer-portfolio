<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; font-family: 'Inter', -apple-system, sans-serif; }
        .banner {
            width: 1200px;
            height: 600px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(249, 115, 22, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(249, 115, 22, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .content {
            text-align: center;
            z-index: 10;
            position: relative;
        }
        .title {
            font-size: 64px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 24px;
            font-weight: 500;
            color: #a3a3a3;
            margin-bottom: 60px;
        }
        .workflow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            margin-top: 40px;
        }
        .box {
            background: #111111;
            border: 1px solid #333333;
            border-radius: 12px;
            padding: 30px;
            width: 200px;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .box-title {
            font-size: 14px;
            font-weight: 600;
            color: #cccccc;
            margin-bottom: 15px;
        }
        .lines {
            width: 100%;
            height: 60px;
            position: relative;
        }
        .line {
            background: #666666;
            height: 2px;
            border-radius: 1px;
            margin-bottom: 8px;
        }
        .line:nth-child(1) { width: 80%; }
        .line:nth-child(2) { width: 50%; }
        .line:nth-child(3) { width: 90%; }
        .line:nth-child(4) { width: 40%; }
        .arrow {
            font-size: 40px;
            color: #f97316;
            font-weight: bold;
        }
        .ai-box {
            background: linear-gradient(135deg, #f97316, #ea580c);
            border: 2px solid #f97316;
            color: white;
        }
        .ai-box .box-title {
            color: white;
        }
        .structured-lines .line {
            background: #f97316;
            opacity: 0.8;
        }
        .impact {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 25px;
            padding: 15px 40px;
            color: #f97316;
            font-size: 18px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="grid"></div>
        <div class="content">
            <div class="title">AI Innovation</div>
            <div class="subtitle">Meeting Notes → Structured Specifications</div>
            
            <div class="workflow">
                <div class="box">
                    <div class="box-title">Raw Meeting Notes</div>
                    <div class="lines">
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                    </div>
                </div>
                
                <div class="arrow">→</div>
                
                <div class="box ai-box">
                    <div class="box-title">AI Processing</div>
                    <div style="font-size: 24px; font-weight: 800;">AI</div>
                </div>
                
                <div class="arrow">→</div>
                
                <div class="box">
                    <div class="box-title">Structured Specs</div>
                    <div class="lines structured-lines">
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="impact">
            Eliminating Manual Reformatting for 8-Person Dev Team
        </div>
    </div>
</body>
</html>
