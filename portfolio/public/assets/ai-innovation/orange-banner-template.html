<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; font-family: 'Inter', -apple-system, sans-serif; }
        .banner {
            width: 1200px;
            height: 600px;
            background: #0a0a0a;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* Grid background */
        .grid-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(26, 26, 26, 0.4) 0.5px, transparent 0.5px),
                linear-gradient(90deg, rgba(26, 26, 26, 0.4) 0.5px, transparent 0.5px);
            background-size: 40px 40px;
        }
        
        /* Orange glow */
        .glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 800px; height: 400px;
            background: radial-gradient(ellipse, rgba(249, 115, 22, 0.1) 0%, rgba(234, 88, 12, 0.05) 50%, rgba(249, 115, 22, 0.1) 100%);
            border-radius: 50%;
        }
        
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
        }
        
        .title {
            font-size: 64px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: 24px;
            font-weight: 500;
            color: #a3a3a3;
            margin-bottom: 60px;
        }
        
        .workflow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
        }
        
        .workflow-box {
            background: #111111;
            border: 1px solid #333333;
            border-radius: 12px;
            padding: 20px;
            width: 200px;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .workflow-box.ai-box {
            background: linear-gradient(135deg, #f97316, #ea580c);
            border: 2px solid #f97316;
            color: white;
            text-align: center;
            align-items: center;
            justify-content: center;
        }
        
        .workflow-box.output {
            border: 2px solid #f97316;
        }
        
        .box-title {
            font-size: 14px;
            font-weight: 600;
            color: #cccccc;
            margin-bottom: 10px;
        }
        
        .ai-box .box-title {
            color: white;
            font-size: 18px;
            font-weight: 800;
        }
        
        .content-lines {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .line {
            height: 2px;
            background: #666666;
            border-radius: 1px;
        }
        
        .line:nth-child(1) { width: 80%; }
        .line:nth-child(2) { width: 50%; }
        .line:nth-child(3) { width: 90%; }
        .line:nth-child(4) { width: 40%; }
        
        .output .line {
            background: #f97316;
            opacity: 0.8;
        }
        
        .arrow {
            font-size: 36px;
            color: #f97316;
            font-weight: bold;
        }
        
        .impact-text {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 25px;
            padding: 15px 40px;
            color: #f97316;
            font-size: 18px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="grid-bg"></div>
        <div class="glow"></div>
        
        <div class="content">
            <div class="title">AI Innovation</div>
            <div class="subtitle">Meeting Notes → Structured Specifications</div>
            
            <div class="workflow">
                <!-- Raw Notes -->
                <div class="workflow-box">
                    <div class="box-title">Raw Meeting Notes</div>
                    <div class="content-lines">
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                    </div>
                </div>
                
                <div class="arrow">→</div>
                
                <!-- AI Processing -->
                <div class="workflow-box ai-box">
                    <div class="box-title">AI</div>
                </div>
                
                <div class="arrow">→</div>
                
                <!-- Structured Output -->
                <div class="workflow-box output">
                    <div class="box-title">Structured Specs</div>
                    <div class="content-lines">
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="impact-text">
            Eliminating Manual Reformatting for 8-Person Dev Team
        </div>
    </div>
</body>
</html>
