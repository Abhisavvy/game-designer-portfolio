<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="600" fill="#0f172a"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="48" font-weight="bold">AI & Innovation</text>
  <text x="600" y="110" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Productivity Tools " Feature Spec Pipeline</text>
  
  <!-- Main workflow visualization -->
  
  <!-- Input: Chaotic Meeting Notes -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="280" height="180" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <text x="140" y="30" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Messy Meeting Notes</text>
    
    <!-- Chaotic content representation -->
    <g opacity="0.7">
      <rect x="20" y="50" width="180" height="6" rx="3" fill="#475569"/>
      <rect x="20" y="65" width="120" height="6" rx="3" fill="#475569"/>
      <rect x="20" y="80" width="200" height="6" rx="3" fill="#475569"/>
      <rect x="20" y="95" width="90" height="6" rx="3" fill="#475569"/>
      <rect x="20" y="110" width="160" height="6" rx="3" fill="#475569"/>
      <rect x="20" y="125" width="140" height="6" rx="3" fill="#475569"/>
      <rect x="20" y="140" width="100" height="6" rx="3" fill="#475569"/>
    </g>
    
    <!-- Scattered elements showing chaos -->
    <circle cx="220" cy="60" r="4" fill="#ef4444"/>
    <circle cx="240" cy="90" r="4" fill="#f59e0b"/>
    <circle cx="230" cy="120" r="4" fill="#ef4444"/>
    <rect x="210" y="140" width="8" height="8" fill="#8b5cf6"/>
  </g>
  
  <!-- AI Processing -->
  <g transform="translate(450, 280)">
    <!-- Arrow -->
    <path d="M0 10 L120 10 L110 0 M120 10 L110 20" stroke="#3b82f6" stroke-width="4" fill="none"/>
    
    <!-- AI Brain -->
    <circle cx="60" cy="10" r="25" fill="#1e40af"/>
    <text x="60" y="17" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">AI</text>
    
    <!-- Processing indicators -->
    <circle cx="40" cy="-10" r="3" fill="#60a5fa" opacity="0.8"/>
    <circle cx="80" cy="-15" r="2" fill="#60a5fa" opacity="0.6"/>
    <circle cx="45" cy="35" r="2" fill="#60a5fa" opacity="0.7"/>
    <circle cx="75" cy="30" r="3" fill="#60a5fa" opacity="0.9"/>
  </g>
  
  <!-- Output: Structured Documentation -->
  <g transform="translate(650, 200)">
    <rect x="0" y="0" width="280" height="180" rx="12" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
    <text x="140" y="30" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Structured Specs</text>
    
    <!-- Organized content -->
    <g opacity="0.9">
      <!-- Section headers -->
      <rect x="20" y="50" width="100" height="8" rx="4" fill="#10b981"/>
      <text x="25" y="58" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="10">Problem Statement</text>
      
      <rect x="20" y="70" width="80" height="8" rx="4" fill="#10b981"/>
      <text x="25" y="78" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="10">Business Goals</text>
      
      <rect x="20" y="90" width="90" height="8" rx="4" fill="#10b981"/>
      <text x="25" y="98" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="10">Design Goals</text>
      
      <rect x="20" y="110" width="70" height="8" rx="4" fill="#10b981"/>
      <text x="25" y="118" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="10">User Flows</text>
      
      <!-- Content lines -->
      <rect x="130" y="52" width="120" height="4" rx="2" fill="#34d399"/>
      <rect x="130" y="72" width="100" height="4" rx="2" fill="#34d399"/>
      <rect x="130" y="92" width="110" height="4" rx="2" fill="#34d399"/>
      <rect x="130" y="112" width="90" height="4" rx="2" fill="#34d399"/>
    </g>
    
    <!-- Success checkmark -->
    <circle cx="240" cy="140" r="15" fill="#10b981"/>
    <path d="M232 140 L238 146 L248 134" stroke="#ffffff" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Secondary output: Stakeholder Emails -->
  <g transform="translate(650, 420)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#1e40af" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Stakeholder Emails</text>
    
    <!-- Email icon -->
    <rect x="30" y="35" width="140" height="35" rx="4" fill="#1e3a8a"/>
    <path d="M30 40 L100 55 L170 40" stroke="#60a5fa" stroke-width="2" fill="none"/>
    <rect x="40" y="50" width="80" height="2" rx="1" fill="#60a5fa"/>
    <rect x="40" y="55" width="60" height="2" rx="1" fill="#60a5fa"/>
    <rect x="40" y="60" width="70" height="2" rx="1" fill="#60a5fa"/>
  </g>
  
  <!-- Connection lines -->
  <path d="M650 290 Q600 350 650 420" stroke="#3b82f6" stroke-width="2" fill="none" stroke-dasharray="8,4" opacity="0.6"/>
  
  <!-- Bottom tagline -->
  <rect x="350" y="520" width="500" height="40" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="545" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16" font-weight="500">Meeting Notes � AI Processing � Structured Documentation</text>
</svg>