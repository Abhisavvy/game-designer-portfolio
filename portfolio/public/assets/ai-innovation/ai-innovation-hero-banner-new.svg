<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background with subtle texture -->
  <rect width="1200" height="600" fill="#0a0a0a"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    
    <!-- Gradient definitions -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ea580c;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.8" />
    </linearGradient>
    
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:#ea580c;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#grid)"/>
  
  <!-- Background glow -->
  <ellipse cx="600" cy="300" rx="400" ry="200" fill="url(#bgGlow)"/>
  
  <!-- Main title -->
  <text x="600" y="140" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" letter-spacing="-0.03em">AI Innovation</text>
  <text x="600" y="180" text-anchor="middle" fill="#a3a3a3" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="500" letter-spacing="-0.01em">Meeting Notes � Structured Specifications</text>
  
  <!-- Left side: Messy input representation -->
  <g transform="translate(120, 280)">
    <!-- Input container -->
    <rect x="0" y="0" width="280" height="180" rx="12" fill="#111111" stroke="#333333" stroke-width="1"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="280" height="40" rx="12" fill="#1a1a1a"/>
    <text x="20" y="28" fill="#cccccc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Raw Meeting Notes</text>
    
    <!-- Chaotic content lines -->
    <g opacity="0.9">
      <!-- Scattered text lines of varying lengths -->
      <rect x="20" y="60" width="160" height="3" rx="1.5" fill="#666666"/>
      <rect x="20" y="75" width="90" height="3" rx="1.5" fill="#666666"/>
      <rect x="20" y="90" width="200" height="3" rx="1.5" fill="#666666"/>
      <rect x="20" y="105" width="70" height="3" rx="1.5" fill="#666666"/>
      <rect x="20" y="120" width="140" height="3" rx="1.5" fill="#666666"/>
      <rect x="20" y="135" width="110" height="3" rx="1.5" fill="#666666"/>
      <rect x="20" y="150" width="180" height="3" rx="1.5" fill="#666666"/>
    </g>
    
    <!-- Scattered bullet points and annotations -->
    <circle cx="200" cy="65" r="2" fill="#f97316" opacity="0.6"/>
    <circle cx="220" cy="95" r="2" fill="#ea580c" opacity="0.7"/>
    <circle cx="210" cy="125" r="2" fill="#f97316" opacity="0.5"/>
    <rect x="190" y="145" width="4" height="4" fill="#ea580c" opacity="0.6"/>
  </g>
  
  <!-- Center: AI transformation process -->
  <g transform="translate(480, 360)">
    <!-- Arrow -->
    <path d="M0 10 L200 10 M190 0 L200 10 L190 20" stroke="url(#primaryGrad)" stroke-width="4" fill="none"/>
    
    <!-- AI brain/processor -->
    <circle cx="100" cy="10" r="35" fill="url(#primaryGrad)" opacity="0.95"/>
    <text x="100" y="18" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800">AI</text>
    
    <!-- Processing indicators -->
    <circle cx="100" cy="10" r="42" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Floating processing dots -->
    <circle cx="65" cy="-20" r="2.5" fill="#f97316" opacity="0.8">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="135" cy="-25" r="2" fill="#ea580c" opacity="0.7">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="70" cy="45" r="2" fill="#f97316" opacity="0.6">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.5s" repeatCount="indefinite" begin="1.6s"/>
    </circle>
    <circle cx="130" cy="40" r="2.5" fill="#ea580c" opacity="0.8">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.5s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
  </g>
  
  <!-- Right side: Structured output -->
  <g transform="translate(800, 280)">
    <!-- Output container -->
    <rect x="0" y="0" width="280" height="180" rx="12" fill="#111111" stroke="url(#primaryGrad)" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="280" height="40" rx="12" fill="url(#primaryGrad)" fill-opacity="0.1"/>
    <text x="20" y="28" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Structured Feature Spec</text>
    
    <!-- Organized sections -->
    <g opacity="0.95">
      <!-- Section headers with orange accent bars -->
      <rect x="20" y="55" width="3" height="16" fill="url(#primaryGrad)"/>
      <text x="32" y="67" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Problem Statement</text>
      
      <rect x="20" y="80" width="3" height="16" fill="url(#primaryGrad)"/>
      <text x="32" y="92" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Business Goals</text>
      
      <rect x="20" y="105" width="3" height="16" fill="url(#primaryGrad)"/>
      <text x="32" y="117" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Design Goals</text>
      
      <rect x="20" y="130" width="3" height="16" fill="url(#primaryGrad)"/>
      <text x="32" y="142" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">User Flows</text>
      
      <rect x="20" y="155" width="3" height="16" fill="url(#primaryGrad)"/>
      <text x="32" y="167" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Implementation</text>
      
      <!-- Content indicators -->
      <rect x="180" y="62" width="70" height="2" rx="1" fill="#f97316" opacity="0.8"/>
      <rect x="180" y="87" width="55" height="2" rx="1" fill="#f97316" opacity="0.8"/>
      <rect x="180" y="112" width="65" height="2" rx="1" fill="#f97316" opacity="0.8"/>
      <rect x="180" y="137" width="50" height="2" rx="1" fill="#f97316" opacity="0.8"/>
      <rect x="180" y="162" width="60" height="2" rx="1" fill="#f97316" opacity="0.8"/>
    </g>
    
    <!-- Success checkmark -->
    <circle cx="250" cy="160" r="10" fill="url(#primaryGrad)"/>
    <path d="M245 160 L248 163 L255 156" stroke="#ffffff" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Bottom impact statement -->
  <rect x="350" y="520" width="500" height="50" rx="25" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
  <text x="600" y="550" text-anchor="middle" fill="#f97316" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600">Eliminating Manual Reformatting for 8-Person Dev Team</text>
</svg>