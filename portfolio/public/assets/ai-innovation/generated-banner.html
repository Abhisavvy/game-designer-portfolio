<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .banner {
            width: 1200px;
            height: 600px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            position: relative;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        /* Animated grid background */
        .grid-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(249, 115, 22, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(249, 115, 22, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        /* Orange glow effects */
        .glow-1 {
            position: absolute;
            top: 20%; left: 15%;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse1 4s ease-in-out infinite;
        }
        
        .glow-2 {
            position: absolute;
            bottom: 20%; right: 15%;
            width: 400px; height: 200px;
            background: radial-gradient(ellipse, rgba(234, 88, 12, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse2 6s ease-in-out infinite;
        }
        
        @keyframes pulse1 {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        
        @keyframes pulse2 {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.05); }
        }
        
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
        }
        
        .title {
            font-size: 72px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: -2px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            background: linear-gradient(45deg, #ffffff, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 28px;
            font-weight: 400;
            color: #a3a3a3;
            margin-bottom: 80px;
            letter-spacing: 1px;
        }
        
        .workflow-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            margin: 40px 0;
        }
        
        .workflow-step {
            background: rgba(17, 17, 17, 0.8);
            border: 2px solid #333333;
            border-radius: 16px;
            padding: 30px 25px;
            width: 220px;
            height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .workflow-step:hover {
            transform: translateY(-5px);
            border-color: #f97316;
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.2);
        }
        
        .workflow-step.ai-center {
            background: linear-gradient(135deg, #f97316, #ea580c);
            border: 2px solid #f97316;
            color: white;
            box-shadow: 0 8px 25px rgba(249, 115, 22, 0.3);
        }
        
        .workflow-step.output {
            border: 2px solid #f97316;
            background: rgba(17, 17, 17, 0.9);
        }
        
        .step-title {
            font-size: 16px;
            font-weight: 700;
            color: #cccccc;
            text-align: center;
            line-height: 1.2;
        }
        
        .ai-center .step-title {
            color: white;
            font-size: 24px;
            font-weight: 900;
        }
        
        .step-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }
        
        .content-line {
            height: 3px;
            background: #666666;
            border-radius: 2px;
            opacity: 0.7;
        }
        
        .content-line:nth-child(1) { width: 85%; }
        .content-line:nth-child(2) { width: 60%; }
        .content-line:nth-child(3) { width: 95%; }
        .content-line:nth-child(4) { width: 45%; }
        
        .output .content-line {
            background: linear-gradient(90deg, #f97316, #ea580c);
            opacity: 0.9;
        }
        
        .arrow {
            font-size: 48px;
            color: #f97316;
            font-weight: 900;
            text-shadow: 0 2px 10px rgba(249, 115, 22, 0.5);
            animation: arrowPulse 2s ease-in-out infinite;
        }
        
        @keyframes arrowPulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        .impact-statement {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #f97316;
            border-radius: 30px;
            padding: 20px 50px;
            color: #f97316;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(249, 115, 22, 0.2);
        }
        
        /* Floating particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #f97316;
            border-radius: 50%;
            opacity: 0.6;
        }
        
        .particle-1 {
            top: 25%; left: 20%;
            animation: float1 8s ease-in-out infinite;
        }
        
        .particle-2 {
            top: 70%; right: 25%;
            animation: float2 10s ease-in-out infinite;
        }
        
        .particle-3 {
            top: 45%; left: 80%;
            animation: float3 12s ease-in-out infinite;
        }
        
        @keyframes float1 {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 0.8; }
        }
        
        @keyframes float2 {
            0%, 100% { transform: translateX(0px) rotate(0deg); opacity: 0.4; }
            50% { transform: translateX(-30px) rotate(-180deg); opacity: 0.9; }
        }
        
        @keyframes float3 {
            0%, 100% { transform: translate(0px, 0px) rotate(0deg); opacity: 0.2; }
            50% { transform: translate(-15px, -25px) rotate(360deg); opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="banner">
        <!-- Background elements -->
        <div class="grid-overlay"></div>
        <div class="glow-1"></div>
        <div class="glow-2"></div>
        
        <!-- Floating particles -->
        <div class="particle particle-1"></div>
        <div class="particle particle-2"></div>
        <div class="particle particle-3"></div>
        
        <!-- Main content -->
        <div class="content">
            <div class="title">AI Innovation</div>
            <div class="subtitle">Meeting Notes → Structured Specifications</div>
            
            <div class="workflow-container">
                <!-- Input -->
                <div class="workflow-step">
                    <div class="step-title">Raw Meeting<br>Notes</div>
                    <div class="step-content">
                        <div class="content-line"></div>
                        <div class="content-line"></div>
                        <div class="content-line"></div>
                        <div class="content-line"></div>
                    </div>
                </div>
                
                <div class="arrow">→</div>
                
                <!-- AI Processing -->
                <div class="workflow-step ai-center">
                    <div class="step-title">AI</div>
                </div>
                
                <div class="arrow">→</div>
                
                <!-- Output -->
                <div class="workflow-step output">
                    <div class="step-title">Structured<br>Feature Specs</div>
                    <div class="step-content">
                        <div class="content-line"></div>
                        <div class="content-line"></div>
                        <div class="content-line"></div>
                        <div class="content-line"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Impact statement -->
        <div class="impact-statement">
            Eliminating Manual Reformatting for 8-Person Dev Team
        </div>
    </div>
</body>
</html>
